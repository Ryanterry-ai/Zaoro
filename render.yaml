services:
  - type: web
    name: build-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    port: 3001
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENGINE_PORT
        value: 3001
      - key: GROQ_API_KEY
        sync: false  # Set via Render dashboard
      - key: GEMINI_API_KEY
        sync: false  # Set via Render dashboard
      - key: DATABASE_URL
        sync: false  # Set via Render dashboard (optional Supabase)
      - key: VERCEL_TOKEN
        sync: false  # Set manually via the Render dashboard
    disk:
      name: workspaces
      mountPath: /app/sandbox_workspaces
      sizeGB: 10
    healthCheckPath: /api/health
    autoDeploy: true
