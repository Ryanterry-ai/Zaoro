name: build.same Engine V4 CI/CD Verification Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Synchronize System Dependencies
      run: npm install

    - name: Programmatic TypeScript Strict Mode Check
      run: npx tsc --noEmit

    - name: Verify ESM Build Targets
      run: npm run build

    - name: Execute Self-Healing Integration Test Harness
      run: npx tsx src/test-harness.ts

    - name: Verify Telemetry Layer
      run: npx tsx scripts/verify-telemetry.ts
